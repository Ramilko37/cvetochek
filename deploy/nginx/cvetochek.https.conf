server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cvetipolubvi.ru www.cvetipolubvi.ru;

    ssl_certificate /etc/letsencrypt/live/cvetipolubvi.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cvetipolubvi.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /api/payments/robokassa/ {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.cvetipolubvi.ru;

    ssl_certificate /etc/letsencrypt/live/cvetipolubvi.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cvetipolubvi.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name cvetipolubvi.ru www.cvetipolubvi.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.cvetipolubvi.ru;
    return 301 https://$host$request_uri;
}
