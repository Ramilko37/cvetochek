name: Deploy To Production Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH client dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy over SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PASSWORD: ${{ secrets.PROD_PASSWORD }}
        run: |
          set -euo pipefail
          SSHPASS="$PROD_PASSWORD" sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            "$PROD_USER@$PROD_HOST" <<'EOF'
            set -euo pipefail
            if [ ! -d /opt/cvetochek/.git ]; then
              git clone https://github.com/Ramilko37/cvetochek.git /opt/cvetochek
            fi
            cd /opt/cvetochek
            git fetch origin main
            git reset --hard origin/main
            export APP_DIR=/opt/cvetochek
            export REPO_URL=https://github.com/Ramilko37/cvetochek.git
            export BRANCH=main
            bash /opt/cvetochek/deploy/server-bootstrap.sh
          EOF
