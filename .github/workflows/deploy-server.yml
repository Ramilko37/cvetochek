name: Deploy To Production Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PASSWORD: ${{ secrets.PROD_PASSWORD }}
        run: |
          set -euo pipefail
          [ -n "${PROD_HOST:-}" ] || { echo "::error::Missing PROD_HOST secret"; exit 11; }
          [ -n "${PROD_USER:-}" ] || { echo "::error::Missing PROD_USER secret"; exit 12; }
          [ -n "${PROD_PASSWORD:-}" ] || { echo "::error::Missing PROD_PASSWORD secret"; exit 13; }
          echo "Secrets are present. Host=$PROD_HOST User=$PROD_USER PasswordLength=${#PROD_PASSWORD}"

      - name: Install SSH client dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass netcat-openbsd

      - name: Check SSH port reachability
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
        run: |
          set -euo pipefail
          nc -vz -w 8 "$PROD_HOST" 22

      - name: Deploy over SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PASSWORD: ${{ secrets.PROD_PASSWORD }}
        run: |
          set -euo pipefail
          SSHPASS="$PROD_PASSWORD" sshpass -e ssh -vv \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=12 \
            "$PROD_USER@$PROD_HOST" <<'EOF'
            set -euo pipefail
            if [ ! -d /opt/cvetochek/.git ]; then
              git clone https://github.com/Ramilko37/cvetochek.git /opt/cvetochek
            fi
            cd /opt/cvetochek
            git fetch origin main
            git reset --hard origin/main
            export APP_DIR=/opt/cvetochek
            export REPO_URL=https://github.com/Ramilko37/cvetochek.git
            export BRANCH=main
            bash /opt/cvetochek/deploy/server-bootstrap.sh
          EOF
