services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cvetochek-backend
    restart: unless-stopped
    env_file:
      - ./deploy/backend.env
    ports:
      - "1337:1337"
    volumes:
      - strapi_uploads:/app/public/uploads
      - strapi_tmp:/app/.tmp
    networks:
      - cvetochek-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-}
        NEXT_PUBLIC_CATALOG_PUBLIC_URL: ${NEXT_PUBLIC_CATALOG_PUBLIC_URL:-}
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
        NEXT_PUBLIC_MIXPANEL_TOKEN: ${NEXT_PUBLIC_MIXPANEL_TOKEN:-}
        NEXT_PUBLIC_MIXPANEL_API_HOST: ${NEXT_PUBLIC_MIXPANEL_API_HOST:-}
        NEXT_PUBLIC_ROBOKASSA_INIT_URL: ${NEXT_PUBLIC_ROBOKASSA_INIT_URL:-}
    container_name: cvetochek-frontend
    restart: unless-stopped
    env_file:
      - ./deploy/frontend.env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - cvetochek-net

networks:
  cvetochek-net:
    driver: bridge

volumes:
  strapi_uploads:
  strapi_tmp:
